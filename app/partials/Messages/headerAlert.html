<!-- ============================================================
     SITE-WIDE HEADER ALERT
     Appears at the top of every page (holiday notices, store
     closures, shipping delays, technical-issue alerts, etc.).

     TO TURN OFF: wrap the <div class="header-alert"> block below
       in an HTML comment. Nothing will render. (When there is
       nothing to announce, leave it commented out.)
     TO TURN ON:  un-comment the block, then edit the title text
       and the message text.

     PICK A STYLE: change the SECOND class on the wrapper div to
       set the color/tone:
         info      = blue   (general notice)
         holiday   = gold   (holiday / office closed)
         warning   = amber  (heads up / delays)
         critical  = red    (urgent / technical issues)

     CHANGE THE ICON: swap the Font Awesome class on the <i> tag.
       Examples: fa-bullhorn, fa-calendar, fa-truck, fa-tools,
       fa-exclamation-triangle, fa-info-circle.
     ============================================================ -->
