<div>
  <div class="panel-category-list no-panels" ng-show="currentCategory.SubCategories.length > 0 || (user.Company.InteropID === 'NSG' && currentCategory.Name === {{'Categories' | r | xlat}})">
    <loadingindicator ng-show="categoryLoadingIndicator" title="{{'Please wait while we fetch all categories' | r | xlat}}" />

    <nav class="nav 451_lbl_subcatlist">
      <ul>
        <li class="col-lg-3 col-md-3 col-sm-4 col-xs-4 col-xxs-4" ng-repeat="c in currentCategory.SubCategories">
          <div>
            <a ng-href="catalog/{{c.InteropID}}" aria-label="{{c.Name}}">
              <figure ng-show="c.Image.URL !== null">
                <img class="img-responsive" ng-src="{{c.Image.URL}}" alt="{{c.Name}}" />
              </figure>
              <div class="empty" ng-show="c.Image.URL === null">
                <span class="fa empty" aria-hidden="true"><i class="fa fa-camera"></i></span>
              </div>
              <h5 ng-bind-html="c.Name" />
            </a>
          </div>
        </li>

        <div ng-show="currentCategory.Name === {{'Categories' | r | xlat}}">
          <div ng-if="user.Company.InteropID === 'NSG'">
            <li class="col-lg-3 col-md-3 col-sm-4 col-xs-4 col-xxs-4">
              <div>
                <a ng-href="https://www.ibcustomshop.com/" href="https://www.ibcustomshop.com/" aria-label="IBVI Custom Catalog Webstore">
                  <img class="img-responsive" ng-src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NSG/images/NSG-Custom-2020-500.jpg" src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NSG/images/NSG-Custom-2020-500.jpg" alt="" />
                  <h5 ng-bind-html="IBVI Custom Catalog" />
                </a>
              </div>
            </li>
            <li class="col-lg-3 col-md-3 col-sm-4 col-xs-4 col-xxs-4">
              <div>
                <a ng-href="https://americorps.nationalservicegear.org/store/catalog" href="https://americorps.nationalservicegear.org/store/catalog" aria-label="Official AmeriCorps Gear Webstore">
                  <img class="img-responsive" ng-src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/AmeriCorps/images/AmeriCorps-2020-500.jpg" src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/AmeriCorps/images/AmeriCorps-2020-500.jpg" alt="" />
                  <h5 ng-bind-html="AmeriCorps" />
                </a>
              </div>
            </li>
            <li class="col-lg-3 col-md-3 col-sm-4 col-xs-4 col-xxs-4">
              <div>
                <a ng-href="https://nps.nationalservicegear.org/store/catalog" href="https://nps.nationalservicegear.org/store/catalog" aria-label="National Park Service Webstore">
                  <img class="img-responsive" ng-src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NationalParkService/images/NPS-2000-500.jpg" src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NationalParkService/images/NPS-2000-500.jpg" alt="" />
                  <h5 ng-bind-html="National Park Service" />
                </a>
              </div>
            </li>
            <li class="col-lg-3 col-md-3 col-sm-4 col-xs-4 col-xxs-4">
              <div>
                <a ng-href="https://blm.nationalservicegear.org/store/catalog" href="https://blm.nationalservicegear.org/store/catalog" aria-label="Bureau of Land Management Webstore">
                  <img class="img-responsive" ng-src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/BLM/images/BLM-500.jpg" src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/BLM/images/BLM-500.jpg" alt="" />
                  <h5 ng-bind-html="Bureau of Land Management" />
                </a>
              </div>
            </li>
            <li class="col-lg-3 col-md-3 col-sm-4 col-xs-4 col-xxs-4">
              <div>
                <a ng-href="https://youthconservationcorps.nationalservicegear.org/store/catalog" href="https://youthconservationcorps.nationalservicegear.org/store/catalog" aria-label="Youth Conservation Corps Webstore">
                  <img class="img-responsive" ng-src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/YCC/images/YCC-2020-500.jpg" src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/YCC/images/YCC-2020-500.jpg" alt="" />
                  <h5 ng-bind-html="Youth Conservation Corps" />
                </a>
              </div>
            </li>
          </div>

          <div ng-if="user.Company.InteropID === 'NPS'">
            <li class="col-lg-3 col-md-3 col-sm-4 col-xs-4 col-xxs-4">
              <div>
                <a ng-href="https://youthconservationcorps.nationalservicegear.org/" 
                  href="https://youthconservationcorps.nationalservicegear.org/" 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  aria-label="Youth Conservation Corps Webstore (opens in a new window)">
                  <img class="img-responsive" 
                    ng-src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/YCC/images/YCC-400.jpg" 
                    alt="" />
                    <h5 ng-bind-html="Youth Conservation Corpse" />
                  <span class="sr-only"> (opens in a new window)</span>
                </a>
              </div>
            </li>
          </div>
        </div>
      </ul>
    </nav>
  </div>
</div>
