<!DOCTYPE HTML>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Down for Scheduled Maintenance</title>
  <style>
    video#bgvid {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -100;
      background: url(https://raw.githubusercontent.com/Four51/Four51StorefrontWiki/master/app_offline/blank.png) no-repeat center center;
      background-size: cover;
      opacity: 0.50;
      filter: alpha(opacity=50);
      /* For IE8 and earlier */
    }

    body {
      margin: 25px 0 180px 0;
      min-height: 100vh;
    }

    main {
      position: relative;
      z-index: 1;
      padding: 40px 16px 0;
      text-align: center;
    }

    h1 {
      font-family: "Raleway", sans-serif;
      color: #2b334a;
      font-weight: 900;
      text-shadow: 0 0 10px #ffffff;
      margin-top: 32px;
    }

    p {
      font-family: "Raleway", sans-serif;
      text-align: center;
      font-weight: 500;
      text-shadow: 0 0 10px #ffffff;
      font-size: 21px;
      color: #242B3F;
      max-width: 75%;
      margin: 24px auto 0;
    }

    h3 {
      font-family: "Raleway", sans-serif;
      text-align: center;
      font-style: italic;
      color: #2b334a;
      font-weight: 600;
      text-shadow: 0 0 10px #ffffff;
      max-width: 75%;
      margin: 24px auto 0;
    }

    .maintenanceScheduleText {
      font-style: normal;
      font-weight: 800;
      font-size: 22px;
    }

    .splash-logos {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      max-width: 90%;
      margin: 0 auto;
      margin-bottom: 24px;
    }

    .splash-logo {
      display: block;
      max-width: 320px;
      max-height: 140px;
      width: auto;
      height: auto;
      margin: 0 auto;
    }

    .splash-logo-nsg {
      max-width: 220px;
      max-height: 100px;
    }
  </style>
  <!--[if lt IE 9]>
  <script>
    document.createElement("video");
  </script>
  <![endif]-->
  <!-- Favicon -->
  <link rel="shortcut icon" href="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NSG/images/favicon.ico" type="image/x-icon">
  <link rel="icon" href="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NSG/images/favicon.ico" type="image/x-icon">
</head>

<body>
  <video id="bgvid" loop autoplay muted playsinline poster="blank.png" aria-hidden="true">
    <source src="https://raw.githubusercontent.com/Four51/Four51StorefrontWiki/master/app_offline/saddayrainyday.ogv" type="video/ogv" />
    <source src="https://raw.githubusercontent.com/Four51/Four51StorefrontWiki/master/app_offline/saddayrainyday.webm" type="video/webm" />
    <source src="https://raw.githubusercontent.com/Four51/Four51StorefrontWiki/master/app_offline/saddayrainyday.mp4" type="video/mp4" />
  </video>
  <main role="main">
    <div class="splash-logos" aria-label="Store branding">
      <img id="splashStoreLogo" class="splash-logo" src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NSG/images/splashPageProgramLogos-500.png" alt="Store logo" />
      <img class="splash-logo splash-logo-nsg" src="https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NSG/images/NSG-byIBVI-500.png" alt="National Service Gear by Industries for the Blind and Visually Impaired" />
    </div>
    <h1 id="splashTitle">Scheduled Maintenance</h1>
    <p id="splashMessage">This site is temporarily down for scheduled maintenance. We apologize for the inconvenience and will be back online shortly.</p>
    <h3 id="splashEtaRow" style="display: none;">Projected to be back online: <span id="splashEta" class="maintenanceScheduleText"></span></h3>
  </main>

  <script type="text/javascript">
    // Reads a per-store, per-incident config written to sessionStorage by the activating store's
    // index.html (see the commented-out "sitedownConfig" block there) just before redirecting here.
    // This page is a plain static file (loaded via a full-page redirect, never through the Angular
    // app), so it can't use ng-include/scope bindings - config has to travel through sessionStorage
    // instead. STORE_LOGOS only needs the store's own logo (rarely changes); title/message/eta are
    // expected to change every time a store goes down, so those always come from the config object
    // rather than being hardcoded per store here.
    var STORE_LOGOS = {
      NSG: 'https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NSG/images/splashPageProgramLogos-500.png',
      NPS: 'https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/NationalParkService/images/US-NationalParkService-Logo.png',
      'USDA-FSIS': 'https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/FSIS/images/FSIS-Banner-2000x600.jpg',
      USACE: 'https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/USACE/images/USACE-500H.png',
      YCC: 'https://www.four51.com/Themes/Custom/bf16eda1-bed2-459f-93f6-26f079f9c976/YCC/images/YCC-Logo.png'
      // Add more "STORE_CODE: 'logo url'" entries here as needed (AMC, BLM, IBC, IBVI, USCB, etc.).
    };

    var config = {};
    try {
      config = JSON.parse(sessionStorage.getItem('sitedownConfig')) || {};
    } catch (e) {
      config = {};
    }

    var storeLogoEl = document.getElementById('splashStoreLogo');
    if (config.store && STORE_LOGOS[config.store]) {
      storeLogoEl.src = STORE_LOGOS[config.store];
      storeLogoEl.alt = config.store + ' logo';
    }

    if (config.title) {
      document.getElementById('splashTitle').textContent = config.title;
    }

    if (config.message) {
      // innerHTML (not textContent) so a mailto link can be included in the message, matching every
      // store's existing splash text - config.message only ever comes from sessionStorage set by
      // this project's own index.html files (never from a URL/query param or third-party input).
      document.getElementById('splashMessage').innerHTML = config.message;
    }

    if (config.eta) {
      document.getElementById('splashEta').textContent = config.eta;
      document.getElementById('splashEtaRow').style.display = '';
    }
  </script>
</body>

</html>
