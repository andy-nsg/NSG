<section class="bento-product-list" ng-show="products" aria-label="Product List">

  <!-- LIST HEADER + SORT -->
  <div class="product-list-header">
    <h2 class="product-list-title">{{'Products' | r | xlat}}</h2>
    <div class="bento-sort view-form-icon" ng-show="currentCategory.SortOptions.length > 0">
      <label for="productSort">{{'Sort by' | r | xlat}}</label>
      <select id="productSort" class="form-control" ng-options="option.SortValue as (option.Display | xlat) for option in currentCategory.SortOptions" ng-model="sort">
        <option value=""></option>
      </select>
      <i class="fa fa-sort" aria-hidden="true"></i>
    </div>
  </div>

  <!-- TOP PAGINATION -->
  <div class="product-list-footer" ng-show="productCount > settings.pageSize" style="margin: 0 0 20px 0;">
    <pagination page="settings.currentPage" max-size="10" rotate="false" boundary-links="true" total-items="productCount" items-per-page="settings.pageSize" direction-links="true" previous-text="{{'Previous' | xlat}}" next-text="{{'Next' | xlat}}" first-text="{{'First' | xlat}}" last-text="{{'Last' | xlat}}"></pagination>
  </div>

  <!-- PRODUCT GRID -->
  <div class="panel-product-list" ng-show="currentCategory.InteropID">

    <!-- Mobile swipe hint -->
    <div ng-show="products" class="alert alert-info text-center hidden-sm hidden-md hidden-lg" style="border-radius: 12px;">
      <i class="fa fa-arrow-circle-o-left" aria-hidden="true"></i>
      {{'Swipe product left for more info' | xlat}}
    </div>

    <loadingindicator ng-show="searchLoading" title="{{'Please wait while we fetch all products' | r | xlat}}" />

    <ul class="bento-product-grid">
      <li id="451_lst_prod" ng-repeat="product in products | paginate:(settings.currentPage-1) * settings.pageSize | limitTo:settings.pageSize | orderBy:sorter:direction">
        <div class="bento-product-card">
          <shortproductview p="product" user="user" />
        </div>
      </li>
    </ul>

  </div>

  <!-- BOTTOM PAGINATION -->
  <div class="product-list-footer" ng-show="productCount > settings.pageSize">
    <pagination page="settings.currentPage" max-size="10" rotate="false" boundary-links="true" total-items="productCount" items-per-page="settings.pageSize" direction-links="true" previous-text="{{'Previous' | xlat}}" next-text="{{'Next' | xlat}}" first-text="{{'First' | xlat}}" last-text="{{'Last' | xlat}}"></pagination>
  </div>

</section>
